<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esportes Academy — Escola · Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #20C997;
      --primary-dark:   #17a57a;
      --primary-light:  #e6faf4;
      --secondary:      #5BC0EB;
      --secondary-light:#e8f6fd;
      --accent:         #FFA552;
      --accent-light:   #fff4e8;
      --success:        #20C997;
      --success-light:  #e6faf4;
      --warning:        #FFA552;
      --warning-light:  #fff4e8;
      --danger:         #ef4444;
      --danger-light:   #fee2e2;
      --info:           #5BC0EB;
      --info-light:     #e8f6fd;
      --purple:         #8b5cf6;
      --purple-light:   #ede9fe;
      --bg:             #F7F9FA;
      --card:           #ffffff;
      --text:           #1B1B1B;
      --text-muted:     #6b7280;
      --border:         #e5e7eb;
      --sidebar-w:      268px;
      --sidebar-bg:     #0d2112;
      --sidebar-hover:  #162e1c;
      --shadow:         0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
      --shadow-md:      0 4px 6px -1px rgba(0,0,0,.09);
      --shadow-lg:      0 10px 20px -3px rgba(0,0,0,.1);
      --radius:         12px;
      --radius-sm:      8px;
      --topbar-h:       60px;
    }

    html { scroll-behavior: smooth; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    /* ── DEMO PROFILE BAR ── */
    .demo-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #1B1B1B; border-radius: 40px;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 6px;
      z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      flex-wrap: wrap; max-width: calc(100vw - 32px);
      justify-content: center;
    }
    .demo-bar-label { color: rgba(255,255,255,.4); font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; padding: 0 4px; white-space: nowrap; }
    .demo-btn {
      padding: 5px 11px; border-radius: 20px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all .15s; white-space: nowrap;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.6);
    }
    .demo-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .demo-btn.active { background: var(--primary); color: #fff; }

    /* ── OVERLAY ── */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:90; backdrop-filter:blur(2px); }
    .overlay.show { display:block; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); height:100dvh; background:var(--sidebar-bg);
      display:flex; flex-direction:column;
      position:fixed; top:0; left:0; z-index:100;
      transform:translateX(-100%);
      transition:transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y:auto;
    }
    .sidebar.open { transform:translateX(0); }
    @media(min-width:1024px){ .sidebar { transform:translateX(0); } }

    /* brand */
    .sidebar-logo { padding:18px 16px 14px; border-bottom:1px solid rgba(255,255,255,.07); flex-shrink:0; }
    .brand { display:flex; align-items:center; gap:10px; }
    .logo-icon { width:36px;height:36px; background:linear-gradient(135deg,var(--primary),var(--secondary)); border-radius:10px; display:flex;align-items:center;justify-content:center; font-size:19px;flex-shrink:0; }
    .brand-text .name { color:#fff;font-weight:700;font-size:13.5px;line-height:1.2; }
    .brand-text .sub  { color:rgba(255,255,255,.35);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase; }

    /* school switcher */
    .school-switcher {
      margin:10px 12px 0;
      background:rgba(32,201,151,.1); border:1px solid rgba(32,201,151,.22);
      border-radius:var(--radius-sm); overflow:hidden;
    }
    .school-current {
      display:flex; align-items:center; gap:9px;
      padding:9px 11px; cursor:pointer; transition:background .15s;
    }
    .school-current:hover { background:rgba(255,255,255,.05); }
    .school-ava {
      width:28px;height:28px; border-radius:6px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      display:flex;align-items:center;justify-content:center;
      font-size:13px;flex-shrink:0;
    }
    .school-info { flex:1; min-width:0; }
    .school-name { color:rgba(255,255,255,.9);font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .school-plan { color:rgba(255,255,255,.38);font-size:10px; }
    .school-caret { color:rgba(255,255,255,.3);font-size:10px;flex-shrink:0; }

    .school-dropdown {
      display:none; border-top:1px solid rgba(255,255,255,.07);
      padding:6px 8px;
    }
    .school-dropdown.open { display:block; }
    .school-opt {
      display:flex;align-items:center;gap:8px;
      padding:7px 9px;border-radius:6px;cursor:pointer;
      transition:background .15s;
    }
    .school-opt:hover { background:rgba(255,255,255,.07); }
    .school-opt-ava { width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0; }
    .school-opt-name { color:rgba(255,255,255,.7);font-size:11px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .school-opt-role { color:rgba(255,255,255,.3);font-size:10px;flex-shrink:0; }

    /* profile chip */
    .profile-chip {
      margin:8px 12px 0;
      display:flex;align-items:center;gap:7px;
      padding:6px 10px;
      border-radius:var(--radius-sm);
      border:1px solid rgba(255,255,255,.08);
    }
    .profile-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
    .profile-label { color:rgba(255,255,255,.55);font-size:11px;font-weight:500;flex:1; }
    .profile-name-chip { color:rgba(255,255,255,.9);font-size:11px;font-weight:700; }

    /* nav */
    .sidebar-nav { padding:8px 10px;flex:1;overflow-y:auto; }
    .nav-section-label { color:rgba(255,255,255,.25);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin:14px 0 4px; }

    .nav-item {
      display:flex;align-items:center;gap:10px;
      padding:9px 12px;border-radius:var(--radius-sm);
      color:rgba(255,255,255,.55);font-size:13px;font-weight:500;
      cursor:pointer;transition:all .15s;margin-bottom:1px;
      text-decoration:none; -webkit-tap-highlight-color:transparent;
      position:relative;
    }
    .nav-item:hover:not(.locked):not(.locked-profile) { background:var(--sidebar-hover);color:rgba(255,255,255,.85); }
    .nav-item.active { background:var(--primary);color:#fff; }
    .nav-item .icon { font-size:15px;width:20px;text-align:center;flex-shrink:0; }
    .nav-item .nav-label { flex:1; }

    /* locked by plan */
    .nav-item.locked { opacity:.45; cursor:not-allowed; }
    .nav-item.locked:hover { background:transparent;color:rgba(255,255,255,.55); }
    .lock-badge {
      margin-left:auto;font-size:10px;font-weight:700;
      padding:1px 6px;border-radius:20px;flex-shrink:0;
    }
    .lock-plan    { background:rgba(255,165,82,.2);  color:#FFA552; }
    .lock-profile { background:rgba(239,68,68,.2);   color:#f87171; }

    /* locked by profile (not by plan) */
    .nav-item.locked-profile { opacity:.35; cursor:not-allowed; }
    .nav-item.locked-profile:hover { background:transparent;color:rgba(255,255,255,.35); }

    /* badge */
    .nav-badge { margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px; }
    .nav-item.active .nav-badge { background:rgba(255,255,255,.25); }

    /* footer */
    .sidebar-footer { padding:10px 10px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0; }
    .user-row { display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s; }
    .user-row:hover { background:var(--sidebar-hover); }
    .user-ava { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0; }
    .user-info .user-name { color:#fff;font-size:12.5px;font-weight:600; }
    .user-info .user-role-text { color:rgba(255,255,255,.35);font-size:10.5px; }
    .logout-btn { margin-left:auto;background:none;border:none;color:rgba(255,255,255,.28);font-size:14px;cursor:pointer;padding:4px;border-radius:4px;transition:color .15s; }
    .logout-btn:hover { color:var(--danger); }

    /* ── MAIN ── */
    .main { display:flex;flex-direction:column;min-height:100dvh; }
    @media(min-width:1024px){ .main { margin-left:var(--sidebar-w); } }

    /* ── TOPBAR ── */
    .topbar { background:var(--card);border-bottom:1px solid var(--border);height:var(--topbar-h);padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow); }
    @media(min-width:640px)  { .topbar { padding:0 22px; } }
    @media(min-width:1024px) { .topbar { padding:0 28px; } }

    .hamburger { width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:none;background:var(--bg);cursor:pointer;font-size:17px;flex-shrink:0; }
    @media(min-width:1024px){ .hamburger { display:none; } }

    .topbar-title { flex:1;min-width:0; }
    .topbar-title .page-title { font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .topbar-title .breadcrumb { font-size:11px;color:var(--text-muted);display:none; }
    @media(min-width:640px){ .topbar-title .page-title { font-size:16px; } .topbar-title .breadcrumb { display:block; } }

    .topbar-right { display:flex;align-items:center;gap:8px;flex-shrink:0; }

    .search-box { display:none;align-items:center;gap:7px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px; }
    @media(min-width:768px) { .search-box { display:flex;width:200px; } }
    @media(min-width:1024px){ .search-box { width:225px; } }
    .search-box input { border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:100%; }
    .search-box input::placeholder { color:var(--text-muted); }

    .icon-btn { width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:15px;position:relative;transition:all .15s; }
    .icon-btn:hover { background:var(--primary-light);border-color:var(--primary); }
    .notif-dot { position:absolute;top:5px;right:6px;width:7px;height:7px;background:var(--accent);border-radius:50%;border:1.5px solid var(--card); }

    .date-pill { display:none;padding:5px 11px;background:var(--primary-light);color:var(--primary-dark);font-size:11.5px;font-weight:600;border-radius:20px; }
    @media(min-width:900px){ .date-pill { display:inline-flex; } }

    /* topbar profile badge */
    .topbar-profile {
      display:none;align-items:center;gap:6px;
      padding:5px 10px;border-radius:20px;
      font-size:11px;font-weight:600;
      border:1.5px solid var(--border);
      background:var(--card);
    }
    @media(min-width:900px){ .topbar-profile { display:flex; } }
    .topbar-profile .tp-dot { width:7px;height:7px;border-radius:50%; }

    /* ── BUTTONS ── */
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap; }
    @media(min-width:640px){ .btn { font-size:14px;padding:9px 18px; } }
    .btn-primary { background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(32,201,151,.3); }
    .btn-primary:hover { background:var(--primary-dark);transform:translateY(-1px); }
    .btn-secondary { background:var(--card);color:var(--text);border:1.5px solid var(--border); }
    .btn-secondary:hover { background:var(--bg); }
    .btn-sm { padding:5px 11px;font-size:12px; }
    .btn-accent { background:var(--accent);color:#fff; }
    .btn-white { background:rgba(255,255,255,.95);color:var(--primary-dark);font-weight:700; }
    .btn-white:hover { background:#fff; }
    .btn-outline-white { background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5); }
    .btn-outline-white:hover { background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.8); }

    /* ── PAGE ── */
    .page-content { padding:20px 16px 100px;flex:1; }
    @media(min-width:640px)  { .page-content { padding:22px 20px 100px; } }
    @media(min-width:1024px) { .page-content { padding:26px 28px 100px; } }

    /* section header */
    .section-header { display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px; }
    .section-title { font-size:14.5px;font-weight:700; }
    .section-sub   { font-size:11.5px;color:var(--text-muted);margin-top:1px; }

    /* cards */
    .card { background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px; }
    .card-sm { padding:16px; }
    @media(min-width:640px){ .card { padding:22px; } }

    /* ── KPI GRID ── */
    .kpi-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px; }
    @media(min-width:640px)  { .kpi-grid { gap:14px; } }
    @media(min-width:768px)  { .kpi-grid { grid-template-columns:repeat(3,1fr); } }
    @media(min-width:1200px) { .kpi-grid { grid-template-columns:repeat(5,1fr); } }

    .kpi-card { background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 16px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s; }
    .kpi-card:hover { box-shadow:var(--shadow-md);transform:translateY(-2px); }
    .kpi-card::before { content:'';position:absolute;top:0;left:0;right:0;height:3px; }
    .kpi-card.green::before  { background:var(--primary); }
    .kpi-card.blue::before   { background:var(--secondary); }
    .kpi-card.orange::before { background:var(--accent); }
    .kpi-card.red::before    { background:var(--danger); }
    .kpi-card.purple::before { background:var(--purple); }

    .kpi-top { display:flex;align-items:flex-start;justify-content:space-between; }
    .kpi-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0; }
    .kpi-icon.green  { background:var(--success-light); }
    .kpi-icon.blue   { background:var(--info-light); }
    .kpi-icon.orange { background:var(--warning-light); }
    .kpi-icon.red    { background:var(--danger-light); }
    .kpi-icon.purple { background:var(--purple-light); }

    .kpi-trend { font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:2px; }
    .kpi-trend.up      { background:var(--success-light);color:var(--primary); }
    .kpi-trend.down    { background:var(--danger-light);color:var(--danger); }
    .kpi-trend.warn    { background:var(--warning-light);color:#b45309; }
    .kpi-trend.neutral { background:var(--bg);color:var(--text-muted); }

    .kpi-value { font-size:26px;font-weight:800;line-height:1;color:var(--text); }
    .kpi-label { font-size:12px;color:var(--text-muted);font-weight:500; }
    .kpi-sub   { font-size:11px;color:var(--text-muted); }
    @media(min-width:640px)  { .kpi-value { font-size:28px; } }
    @media(min-width:1024px) { .kpi-value { font-size:30px; } }

    /* restricted kpi */
    .kpi-card.restricted { opacity:.5; pointer-events:none; filter:blur(1px); }
    .kpi-card.restricted .kpi-value { filter:blur(4px); }

    /* ── MAIN GRID ── */
    .main-grid { display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:18px; }
    @media(min-width:900px)  { .main-grid { grid-template-columns:1fr 370px; } }
    @media(min-width:1200px) { .main-grid { grid-template-columns:1fr 410px; } }

    /* chart */
    .chart-card { background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px; }
    .chart-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px; }
    .chart-title { font-size:14px;font-weight:700; }
    .chart-sub   { font-size:11px;color:var(--text-muted);margin-top:1px; }
    .chart-tabs  { display:flex;gap:4px; }
    .chart-tab   { padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:none;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .15s; }
    .chart-tab.active { background:var(--primary);color:#fff; }
    .chart-wrapper { position:relative;height:240px; }
    @media(min-width:640px)  { .chart-wrapper { height:260px; } }
    @media(min-width:1024px) { .chart-wrapper { height:275px; } }

    .rev-summary { display:flex;gap:14px;flex-wrap:wrap;margin-top:12px; }
    .rev-item    { display:flex;align-items:center;gap:6px;font-size:12px; }
    .rev-dot     { width:10px;height:10px;border-radius:50%;flex-shrink:0; }

    /* turmas */
    .turma-list { display:flex;flex-direction:column;gap:9px; }
    .turma-item { display:flex;align-items:center;gap:9px; }
    .turma-rank { width:22px;height:22px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--text-muted);flex-shrink:0; }
    .turma-rank.gold   { background:#fef9c3;color:#b45309; }
    .turma-rank.silver { background:#f1f5f9;color:#64748b; }
    .turma-rank.bronze { background:#fef3c7;color:#92400e; }
    .turma-info { flex:1;min-width:0; }
    .turma-name { font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .turma-meta { font-size:11px;color:var(--text-muted); }
    .turma-bar-wrap { flex:1;min-width:70px;max-width:90px;height:5px;background:var(--border);border-radius:99px;overflow:hidden; }
    .turma-bar { height:100%;border-radius:99px;background:var(--primary); }
    .turma-pct { font-size:11px;font-weight:700;color:var(--text-muted);flex-shrink:0;min-width:32px;text-align:right; }

    /* bottom grid */
    .bottom-grid { display:grid;grid-template-columns:1fr;gap:16px; }
    @media(min-width:768px)  { .bottom-grid { grid-template-columns:1fr 1fr; } }
    @media(min-width:1100px) { .bottom-grid { grid-template-columns:1fr 1fr 1fr; } }

    /* alerts */
    .alert-list { display:flex;flex-direction:column;gap:8px; }
    .alert-item { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border-left:3px solid transparent; }
    .alert-item.red    { background:var(--danger-light); border-color:var(--danger); }
    .alert-item.orange { background:var(--warning-light);border-color:var(--accent); }
    .alert-item.blue   { background:var(--info-light);   border-color:var(--secondary); }
    .alert-item.green  { background:var(--success-light);border-color:var(--primary); }
    .alert-icon { font-size:15px;flex-shrink:0; }
    .alert-info { flex:1;min-width:0; }
    .alert-msg  { font-size:12px;font-weight:600;line-height:1.3; }
    .alert-sub  { font-size:11px;color:var(--text-muted); }

    /* table */
    .mini-table { width:100%;border-collapse:collapse;font-size:12px; }
    .mini-table th { text-align:left;padding:6px 8px;color:var(--text-muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid var(--border);white-space:nowrap; }
    .mini-table td { padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle; }
    .mini-table tr:last-child td { border-bottom:none; }
    .mini-table tr:hover td { background:var(--bg); }
    .table-scroll { overflow-x:auto;-webkit-overflow-scrolling:touch; }

    /* badges */
    .badge { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600; }
    .badge-danger  { background:var(--danger-light); color:var(--danger); }
    .badge-warning { background:var(--warning-light);color:#b45309; }
    .badge-success { background:var(--success-light);color:var(--primary-dark); }
    .badge-info    { background:var(--info-light);   color:#0369a1; }
    .badge-gray    { background:var(--bg);           color:var(--text-muted); }

    /* chamada */
    .chamada-list { display:flex;flex-direction:column;gap:7px; }
    .chamada-item { display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg);border-radius:var(--radius-sm);transition:background .15s; }
    .chamada-item:hover { background:var(--primary-light); }
    .turma-ava { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
    .chamada-info { flex:1;min-width:0; }
    .chamada-turma { font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .chamada-meta  { font-size:11px;color:var(--text-muted); }
    .chamada-status { font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0; }
    .chamada-status.done    { background:var(--success-light);color:var(--primary-dark); }
    .chamada-status.pending { background:var(--warning-light);color:#b45309; }
    .chamada-status.future  { background:var(--bg);color:var(--text-muted);border:1px solid var(--border); }

    /* welcome banner */
    .welcome-banner { background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;color:#fff;overflow:hidden;position:relative; }
    .welcome-banner::after { content:'🏃';position:absolute;right:110px;top:-8px;font-size:60px;opacity:.12; }
    .wt-greeting { font-size:11.5px;font-weight:500;opacity:.8; }
    .wt-title    { font-size:18px;font-weight:800;margin-top:2px; }
    .wt-sub      { font-size:11.5px;opacity:.72;margin-top:3px; }
    @media(min-width:640px){ .wt-title { font-size:20px; } }
    .welcome-cta { display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap; }

    /* quick actions */
    .quick-actions { display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px; }
    .quick-btn { background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .18s;text-decoration:none;color:var(--text); }
    .quick-btn:hover { border-color:var(--primary);background:var(--primary-light);transform:translateY(-2px);box-shadow:var(--shadow-md); }
    .quick-btn.locked-action { opacity:.4;cursor:not-allowed;pointer-events:none; }
    .qb-icon  { font-size:19px; }
    .qb-label { font-size:11px;font-weight:600;text-align:center;line-height:1.3; }

    /* freq ring */
    .freq-widget { display:flex;align-items:center;gap:12px; }
    .freq-ring-wrap { position:relative;width:68px;height:68px;flex-shrink:0; }
    .freq-ring-wrap canvas { width:68px!important;height:68px!important; }
    .freq-ring-center { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center; }
    .ring-val  { font-size:15px;font-weight:800;line-height:1; }
    .ring-unit { font-size:9px;color:var(--text-muted); }
    .freq-stats { flex:1;min-width:0; }
    .freq-stat-row { display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border); }
    .freq-stat-row:last-child { border-bottom:none; }
    .freq-stat-label { font-size:11.5px;color:var(--text-muted); }
    .freq-stat-val   { font-size:11.5px;font-weight:700; }

    /* divider */
    .divider { height:1px;background:var(--border);margin:12px 0; }

    /* restricted overlay block */
    .module-blocked {
      background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 20px;text-align:center;gap:10px;
      border:2px dashed var(--border);
    }
    .module-blocked .block-icon { font-size:32px; }
    .module-blocked .block-title { font-size:14px;font-weight:700;color:var(--text); }
    .module-blocked .block-sub   { font-size:12px;color:var(--text-muted);max-width:240px; }
    .module-blocked .block-type-plan    { background:var(--accent-light);color:#b45309;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px; }
    .module-blocked .block-type-profile { background:var(--danger-light);color:var(--danger);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px; }

    /* page footer */
    .page-footer { padding:12px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-muted);background:var(--card);flex-wrap:wrap;gap:8px; }

    /* hidden util */
    .hidden { display:none!important; }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */

  saude:        { label:'Saúde',            color:'#ef4444', icon:'🩺', initials:'DR', name:'Dr. Rafael' },

// NAV structure
const NAV = [
  { section: 'Principal' },
  { id:'dashboard',        icon:'📊', label:'Dashboard',         module:'administrativo' },
  { id:'atletas',          icon:'👥', label:'Atletas',            module:'administrativo' },
  { id:'turmas',           icon:'🗂️',  label:'Turmas',             module:'administrativo', href:'Escola-grupos.html' },
  { id:'presencas',        icon:'✅', label:'Presenças',          module:'administrativo' },
  { section: 'Gestão' },

  { id:'saude',            icon:'🩺', label:'Saúde',              module:'saude' },

];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let activeProfile = 'admin_escola';
let activePlan    = PLAN;
let currentSchool = 'Arena Futebol Kids';
let chartInstances = {};

/* ═══════════════════════════════════════════════
   SIDEBAR NAV RENDER
═══════════════════════════════════════════════ */
function renderNav() {
  const planMods    = PLAN_MODULES[activePlan];
  const profileMods = PROFILE_MODULES[activeProfile];
  const container   = document.getElementById('sidebar-nav');
  container.innerHTML = '';

  NAV.forEach(item => {
    if (item.section) {
      const lbl = document.createElement('div');
      lbl.className = 'nav-section-label';
      lbl.textContent = item.section;
      container.appendChild(lbl);
      return;
    }

    const inPlan    = planMods.includes(item.module);
    const inProfile = profileMods.includes(item.module);
    const isActive  = item.id === 'dashboard';

    const a = document.createElement('a');
    a.href = item.href || '#';

    if (isActive) {
      a.className = 'nav-item active';
    } else if (!inPlan) {
      a.className = 'nav-item locked';
    } else if (!inProfile) {
      a.className = 'nav-item locked-profile';
    } else {
      a.className = 'nav-item';
    }

    let lockBadgeHTML = '';
    if (!inPlan) {
      lockBadgeHTML = `<span class="lock-badge lock-plan">🔒 Upgrade</span>`;
    } else if (!inProfile) {
      lockBadgeHTML = `<span class="lock-badge lock-profile">🚫 Perfil</span>`;
    } else if (item.badge) {
      lockBadgeHTML = `<span class="nav-badge">${item.badge}</span>`;
    }

    a.innerHTML = `<span class="icon">${item.icon}</span><span class="nav-label">${item.label}</span>${lockBadgeHTML}`;
    container.appendChild(a);
  });
}

/* ═══════════════════════════════════════════════
   PROFILE UPDATE
═══════════════════════════════════════════════ */
function setProfile(profile, btn) {
  activeProfile = profile;
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const meta = PROFILE_META[profile];

  // chip
  document.getElementById('chip-dot').style.background  = meta.color;
  document.getElementById('chip-name').textContent       = meta.label;

  // user footer
  document.getElementById('sidebarAva').textContent  = meta.initials;
  document.getElementById('sidebarName').textContent = meta.name;
  document.getElementById('sidebarRole').textContent = meta.label;

  // topbar avatar + badge
  document.getElementById('topbar-avatar').textContent  = meta.initials;
  document.getElementById('tp-dot').style.background    = meta.color;
  document.getElementById('tp-label').textContent       = meta.label;

  renderNav();
  renderDashboard();
}

/* ═══════════════════════════════════════════════
   SCHOOL SWITCHER
═══════════════════════════════════════════════ */
function toggleSchoolDropdown() {
  const dd     = document.getElementById('school-dropdown');
  const caret  = document.getElementById('school-caret');
  const isOpen = dd.classList.toggle('open');
  caret.textContent = isOpen ? '▲' : '▼';
}

function switchSchool(name, plan, profile) {
  currentSchool = name;
  activePlan    = plan.toLowerCase();
  document.querySelector('.school-name').textContent  = name;
  document.getElementById('plan-label').textContent   = `Plano ${plan} · Ativo`;
  document.getElementById('breadcrumb').textContent   = `Escola · ${name}`;
  document.getElementById('school-dropdown').classList.remove('open');
  document.getElementById('school-caret').textContent = '▼';

  // activate matching profile btn
  const btns = document.querySelectorAll('.demo-btn');
  btns.forEach(b => {
    b.classList.remove('active');
    if (b.getAttribute('onclick').includes(profile)) b.classList.add('active');
  });

  setProfile(profile, null);
}

/* ═══════════════════════════════════════════════
   DASHBOARD CONTENT
═══════════════════════════════════════════════ */
function renderDashboard() {
  destroyCharts();
  const container = document.getElementById('page-content');
  container.innerHTML = '';

  const planMods    = PLAN_MODULES[activePlan];
  const profileMods = PROFILE_MODULES[activeProfile];

  const canAdmin   = planMods.includes('administrativo') && profileMods.includes('administrativo');
  const canFin     = planMods.includes('financeiro')     && profileMods.includes('financeiro');
  const canSaude   = planMods.includes('saude')          && profileMods.includes('saude');
  const canEventos = planMods.includes('eventos')        && profileMods.includes('eventos');
  const canTrein   = planMods.includes('treinamentos')   && profileMods.includes('treinamentos');

  // Welcome banner
  const meta = PROFILE_META[activeProfile];
  const welcomeActions = buildWelcomeActions();
  container.innerHTML += `
    <div class="welcome-banner">
      <div>
        <div class="wt-greeting">Bom dia, ${meta.name.split(' ')[0]} ${meta.icon}</div>
        <div class="wt-title">${currentSchool}</div>
        <div class="wt-sub">${meta.label} · Terça-feira, 24 de março de 2026</div>
      </div>
      <div class="welcome-cta">${welcomeActions}</div>
    </div>`;

  // Quick actions
  container.innerHTML += buildQuickActions(canAdmin, canFin, canSaude, canEventos);

  // KPIs
  container.innerHTML += buildKPIs(canAdmin, canFin, canSaude);

  // Main grid
  if (canAdmin || canFin) {
    container.innerHTML += `<div class="main-grid" id="main-grid">`;
    container.innerHTML += buildChartCard(canAdmin, canFin);
    container.innerHTML += buildTopTurmas(canAdmin);
    container.innerHTML += `</div>`;
  }

  // Bottom grid
  container.innerHTML += `<div class="bottom-grid">`;
  container.innerHTML += buildAlertas(canAdmin, canFin, canSaude);
  if (canFin) container.innerHTML += buildInadimplentes();
  else if (canSaude) container.innerHTML += buildSaudePanel();
  else if (canEventos) container.innerHTML += buildEventosPanel();
  container.innerHTML += buildChamadaDia(canAdmin);
  container.innerHTML += `</div>`;

  // init charts after DOM
  requestAnimationFrame(() => {
    if (document.getElementById('revenueChart')) buildRevenueChart();
    if (document.getElementById('freqRing'))     buildFreqRing();
  });
}

/* ── Welcome actions per profile ── */
function buildWelcomeActions() {
  const map = {
    admin_escola: `<button class="btn btn-white btn-sm">+ Novo Atleta</button><button class="btn btn-outline-white btn-sm">📣 Comunicado</button>`,
    coordenador:  `<button class="btn btn-white btn-sm">+ Plano de Treino</button><button class="btn btn-outline-white btn-sm">📊 Relatório</button>`,
    professor:    `<button class="btn btn-white btn-sm">✅ Fazer Chamada</button><button class="btn btn-outline-white btn-sm">📝 Plano de Aula</button>`,
    financeiro:   `<button class="btn btn-white btn-sm">💳 Nova Cobrança</button><button class="btn btn-outline-white btn-sm">📊 Exportar CSV</button>`,
    secretaria:   `<button class="btn btn-white btn-sm">+ Novo Atleta</button><button class="btn btn-outline-white btn-sm">📣 Comunicado</button>`,
    saude:        `<button class="btn btn-white btn-sm">🩺 Nova Avaliação</button><button class="btn btn-outline-white btn-sm">🏥 Registrar Lesão</button>`,
    marketing:    `<button class="btn btn-white btn-sm">🎉 Criar Evento</button><button class="btn btn-outline-white btn-sm">📣 Comunicado</button>`,
  };
  return map[activeProfile] || '';
}

/* ── Quick Actions ── */
function buildQuickActions(canAdmin, canFin, canSaude, canEventos) {
  const allActions = {
    admin_escola: [
      { icon:'👤', label:'Cadastrar Atleta', ok:true },
      { icon:'✅', label:'Fazer Chamada',    ok:true },
      { icon:'💳', label:'Nova Cobrança',    ok:true },
      { icon:'📋', label:'Relatório',        ok:true },
    ],
    coordenador: [
      { icon:'📚', label:'Plano de Treino',  ok:true },
      { icon:'📖', label:'Biblioteca',       ok:true },
      { icon:'📊', label:'Frequência',       ok:true },
      { icon:'💳', label:'Financeiro',       ok:false },
    ],
    professor: [
      { icon:'✅', label:'Fazer Chamada',    ok:true },
      { icon:'📝', label:'Plano de Aula',    ok:true },
      { icon:'👤', label:'Ficha Atleta',     ok:true },
      { icon:'💳', label:'Financeiro',       ok:false },
    ],
    financeiro: [
      { icon:'💳', label:'Nova Cobrança',    ok:true },
      { icon:'📊', label:'Inadimplentes',    ok:true },
      { icon:'📤', label:'Exportar CSV',     ok:true },
      { icon:'✅', label:'Chamada',          ok:false },
    ],
    secretaria: [
      { icon:'👤', label:'Novo Atleta',      ok:true },
      { icon:'📣', label:'Comunicado',       ok:true },
      { icon:'🗂️',  label:'Turmas',           ok:true },
      { icon:'💳', label:'Financeiro',       ok:false },
    ],
    saude: [
      { icon:'🩺', label:'Nova Avaliação',   ok:true },
      { icon:'🏥', label:'Registrar Lesão',  ok:true },
      { icon:'📄', label:'Atestados',        ok:true },
      { icon:'💳', label:'Financeiro',       ok:false },
    ],
    marketing: [
      { icon:'🎉', label:'Criar Evento',     ok:true },
      { icon:'📣', label:'Comunicado',       ok:true },
      { icon:'🏆', label:'Competição',       ok:true },
      { icon:'💳', label:'Financeiro',       ok:false },
    ],
  };
  const actions = allActions[activeProfile] || allActions.admin_escola;
  return `<div class="quick-actions">${actions.map(a => `
    <a href="#" class="quick-btn${a.ok ? '' : ' locked-action'}">
      <span class="qb-icon">${a.icon}</span>
      <span class="qb-label">${a.label}</span>
    </a>`).join('')}</div>`;
}

/* ── KPI Cards ── */
function buildKPIs(canAdmin, canFin, canSaude) {
  const profileMods = PROFILE_MODULES[activeProfile];
  const planMods    = PLAN_MODULES[activePlan];

  const restricted = (mod) => {
    const inPlan    = planMods.includes(mod);
    const inProfile = profileMods.includes(mod);
    if (!inPlan)    return 'plan';
    if (!inProfile) return 'profile';
    return false;
  };

  function kpi(colorClass, iconClass, icon, trend, trendClass, value, label, sub, module) {
    const r = restricted(module);
    const cls = r ? ' restricted' : '';
    return `
    <div class="kpi-card ${colorClass}${cls}">
      <div class="kpi-top">
        <div class="kpi-icon ${iconClass}">${icon}</div>
        <span class="kpi-trend ${trendClass}">${trend}</span>
      </div>
      <div class="kpi-value">${value}</div>
      <div class="kpi-label">${label}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`;
  }

function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};
}

const months = ['Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar'];

function buildRevenueChart() {
  const el = document.getElementById('revenueChart');
  if (!el) return;
  const ctx = el.getContext('2d');
  const profileMods = PROFILE_MODULES[activeProfile];
  const showRevenue = profileMods.includes('financeiro');

  if (showRevenue) {
    chartInstances.revenue = new Chart(ctx, {
      type:'bar',
      data:{
        labels: months,
        datasets:[
          { label:'Prevista',  data:[10200,10400,10400,10600,10800,10800,11000,11000,11200,11200,11300,11300], backgroundColor:'rgba(229,231,235,.65)', borderRadius:4, order:2 },
          { label:'Realizada', data:[9100,9800,9600,10100,10400,9900,10600,10200,10900,10100,9540,9840],       backgroundColor:'rgba(32,201,151,.8)',    borderRadius:4, order:1 },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c => ` R$ ${c.raw.toLocaleString('pt-BR')}` } } },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:10},color:'#6b7280'} },
          y:{ grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10},color:'#6b7280', callback: v => 'R$'+(v/1000).toFixed(0)+'k'} }
        }
      }
    });
  } else {
    // frequency chart for non-financial profiles
    chartInstances.revenue = new Chart(ctx, {
      type:'line',
      data:{
        labels: months,
        datasets:[{ label:'Frequência (%)', data:[78,82,75,80,85,79,83,77,81,84,78,82], borderColor:'#5BC0EB', backgroundColor:'rgba(91,192,235,.1)', borderWidth:2.5, fill:true, tension:.4, pointBackgroundColor:'#5BC0EB', pointRadius:3 }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:10},color:'#6b7280'} },
          y:{ min:60, max:100, grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10},color:'#6b7280', callback: v => v+'%'} }
        }
      }
    });
  }
}

function buildFreqRing() {
  const el = document.getElementById('freqRing');
  if (!el) return;
  chartInstances.freqRing = new Chart(el.getContext('2d'), {
    type:'doughnut',
    data:{ datasets:[{ data:[82,18], backgroundColor:['#20C997','#e5e7eb'], borderWidth:0, hoverOffset:0 }] },
    options:{ responsive:false, cutout:'72%', plugins:{ legend:{display:false}, tooltip:{enabled:false} } }
  });
}

function switchChart(type, btn) {
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (chartInstances.revenue) { chartInstances.revenue.destroy(); delete chartInstances.revenue; }
  const el = document.getElementById('revenueChart');
  if (!el) return;
  const ctx = el.getContext('2d');
  if (type === 'revenue') {
    chartInstances.revenue = new Chart(ctx, {
      type:'bar',
      data:{ labels:months, datasets:[
        { label:'Prevista',  data:[10200,10400,10400,10600,10800,10800,11000,11000,11200,11200,11300,11300], backgroundColor:'rgba(229,231,235,.65)', borderRadius:4, order:2 },
        { label:'Realizada', data:[9100,9800,9600,10100,10400,9900,10600,10200,10900,10100,9540,9840],       backgroundColor:'rgba(32,201,151,.8)',    borderRadius:4, order:1 },
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` R$ ${c.raw.toLocaleString('pt-BR')}`}}}, scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7280'}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},color:'#6b7280',callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}} }
    });
  } else {
    chartInstances.revenue = new Chart(ctx, {
      type:'line',
      data:{ labels:months, datasets:[{ label:'Frequência (%)', data:[78,82,75,80,85,79,83,77,81,84,78,82], borderColor:'#5BC0EB', backgroundColor:'rgba(91,192,235,.1)', borderWidth:2.5, fill:true, tension:.4, pointBackgroundColor:'#5BC0EB', pointRadius:3 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7280'}},y:{min:60,max:100,grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},color:'#6b7280',callback:v=>v+'%'}}} }
    });
  }
}
